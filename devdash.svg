<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#11111b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#89b4fa"/>
      <stop offset="100%" style="stop-color:#74c7ec"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="4" y="4" width="120" height="120" rx="24" fill="url(#bg)" stroke="#313244" stroke-width="2"/>
  <!-- Terminal bracket < -->
  <path d="M 52 38 L 28 64 L 52 90" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Terminal bracket > -->
  <path d="M 76 38 L 100 64 L 76 90" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dash in the middle -->
  <line x1="56" y1="64" x2="72" y2="64" stroke="#a6e3a1" stroke-width="6" stroke-linecap="round"/>
  <!-- Small dots for dashboard feel -->
  <circle cx="36" cy="108" r="4" fill="#f38ba8" opacity="0.8"/>
  <circle cx="52" cy="108" r="4" fill="#f9e2af" opacity="0.8"/>
  <circle cx="68" cy="108" r="4" fill="#a6e3a1" opacity="0.8"/>
</svg>
